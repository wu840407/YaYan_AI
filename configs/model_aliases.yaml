# YaYan-AI 模型別名對照表（內部維護用，UI 與 log 只顯示 YaYan_* 前綴）
# real_id 僅在離線下載階段使用；部署後不在使用者介面顯示
# License 欄位為授權合規追蹤用，請勿移除

models:
  # ============= LLM =============
  YaYan_Reasoner:
    real_id: Qwen/Qwen3-14B
    local_dir: YaYan_Reasoner_14B   # ← 從 YaYan_Reasoner 改
    role: llm_general
    license: Apache-2.0
    size_gb: 28
    quantizable: true               # ← 從 false 改 true
    note: "BF16 原版，由 bitsandbytes 在載入時做 NF4 4-bit 量化"

  YaYan_Translator:
    real_id: Qwen/Qwen3-14B
    local_dir: YaYan_Reasoner_14B   # ← 同步改
    role: llm_translate
    license: Apache-2.0
    size_gb: 0
    note: "shares weights with YaYan_Reasoner"

  # ============= ASR =============
  YaYan_ASR_Mandarin:
    real_id: FunAudioLLM/SenseVoiceSmall
    local_dir: YaYan_ASR_Mandarin
    role: asr_chinese_dialects
    license: Apache-2.0
    size_gb: 1.0
    languages: [zh, cmn, yue, wuu, cdo, ja, ko, en]

  YaYan_ASR_Eastern:
    real_id: DataoceanAI/dolphin-base
    local_dir: YaYan_ASR_Eastern
    role: asr_eastern_minorities
    license: Apache-2.0
    size_gb: 0.5
    languages: [bo, ug, kk, mn, zh-dialects-22]

  YaYan_ASR_Global:
    real_id: openai/whisper-large-v3
    local_dir: YaYan_ASR_Global
    role: asr_persian_urdu_etc
    license: MIT
    size_gb: 3.0
    languages: [fa, ur, en, ar, hi, ru, "+96-others"]

  # ============= VAD =============
  # silero-vad 不從 HF 下載，靠 pip 套件 (silero-vad>=5.1) 內建權重。
  # 此 alias 僅作為文件記錄，verify_models.py 不會檢查 local_dir 是否存在。
  YaYan_VAD:
    real_id: snakers4/silero-vad
    local_dir: YaYan_VAD
    role: voice_activity_detection
    license: MIT
    size_gb: 0.005
    note: "pip-bundled, no local_dir download needed"

  # ============= LID =============
  YaYan_LID:
    real_id: speechbrain/lang-id-voxlingua107-ecapa
    local_dir: YaYan_LID
    role: language_identification
    license: Apache-2.0
    size_gb: 0.1

  # ============= Diarization 三件套（gated, HF token required）=============
  YaYan_Diarize:
    real_id: pyannote/speaker-diarization-3.1
    local_dir: YaYan_Diarize
    role: speaker_diarization_pipeline
    license: MIT
    size_gb: 0.01
    note: "pipeline config; references YaYan_Diarize_Seg + YaYan_Diarize_Embed"

  YaYan_Diarize_Seg:
    real_id: pyannote/segmentation-3.0
    local_dir: YaYan_Diarize_Seg
    role: speaker_diarization_segmentation
    license: MIT
    size_gb: 0.006

  YaYan_Diarize_Embed:
    real_id: pyannote/wespeaker-voxceleb-resnet34-LM
    local_dir: YaYan_Diarize_Embed
    role: speaker_diarization_embedding
    license: CC-BY-4.0
    size_gb: 0.028
